name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Compile examples (Arduino / esp32dev)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('library.json', 'examples/**/platformio.ini') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Compile examples
        run: |
          set -e
          shopt -s nullglob
          built=0
          for d in examples/*/; do
            sketches=("$d"*.ino)
            [ ${#sketches[@]} -gt 0 ] || continue
            echo "::group::pio ci $d"
            pio ci "$d" --lib . --board esp32dev
            echo "::endgroup::"
            built=$((built + 1))
          done
          echo "Compiled $built example(s)."
          [ "$built" -gt 0 ]
